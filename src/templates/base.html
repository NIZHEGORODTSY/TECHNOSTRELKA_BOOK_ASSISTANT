<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Fragment Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">

</head>
<body>
<div class="container">
    <header>
        <h1>Book Fragment Search</h1>
        <p class="subtitle">Search for specific text fragments within classic literature</p>
    </header>
    <main>
        <section class="search-container">
            <form method="POST" action="/">
                <div class="search-box">
                    <input name="user_text" type="text" class="search-input" id="searchInput" placeholder="Enter text to search...">
                    <button type="submit" class="btn" id="searchBtn">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </form>
        </section>

        <section class="results-container">
            {% for item in answer %}
                <div class="results-header">
                    <div class="result-count" id="resultCount">{{item}}</div>
                </div>
            {% endfor %}


        </section>
    </main>

    <footer>
        <p>Book Fragment Search Tool &copy; Technostrelka, 2026 | NIZHEGORODTSY</p>
    </footer>
</div>


</body>
</html>
