<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Fragment Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main-page.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/nav-style.css') }}">

</head>
<body>
<div class="container">
    <header>
        <h1>Поиск фрагментов в книгах</h1>
        <p class="subtitle">Быстрый и точный поиск текстовых фрагментов в классической литературе</p>
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-book-open"></i>
                </div>
                <div class="logo-text">BookSearch</div>
            </a>

            <div class="menu-toggle" id="menuToggle">
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
            </div>

            <ul class="nav-menu" id="navMenu">
                <li class="nav-item">
                    <a href="/" class="nav-link active">
                        <i class="fas fa-home"></i>Главная
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/search" class="nav-link">
                        <i class="fas fa-search"></i>Поиск
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/library" class="nav-link">
                        <i class="fas fa-book"></i>Библиотека
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/question" class="nav-link">
                        <i class="fas fa-history"></i>Вопрос к ИИ
                    </a>
                </li>
            </ul>


        </div>
    </header>

    <main role="main" class="main-content">
        {% block content %}{% endblock %}
    </main>
    <script>// Mobile menu toggle functionality
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');

    menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('active');

            // Animate hamburger icon
            const bars = menuToggle.querySelectorAll('.menu-bar');
            if (navMenu.classList.contains('active')) {
                bars[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                bars[1].style.opacity = '0';
                bars[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
            } else {
                bars[0].style.transform = 'none';
                bars[1].style.opacity = '1';
                bars[2].style.transform = 'none';
            }
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!navMenu.contains(e.target) && !menuToggle.contains(e.target)) {
                navMenu.classList.remove('active');

                // Reset hamburger icon
                const bars = menuToggle.querySelectorAll('.menu-bar');
                bars[0].style.transform = 'none';
                bars[1].style.opacity = '1';
                bars[2].style.transform = 'none';
            }
        });

        // Active link indicator
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                navLinks.forEach(item => item.classList.remove('active'));
                this.classList.add('active');

                // Close mobile menu after selection
                if (window.innerWidth <= 768) {
                    navMenu.classList.remove('active');
                    const bars = menuToggle.querySelectorAll('.menu-bar');
                    bars[0].style.transform = 'none';
                    bars[1].style.opacity = '1';
                    bars[2].style.transform = 'none';
                }
            });
        });

    </script>

    <footer>
        <p>Book Fragment Search Tool &copy; Technostrelka, 2026 | NIZHEGORODTSY</p>
    </footer>
</div>


</body>
</html>
