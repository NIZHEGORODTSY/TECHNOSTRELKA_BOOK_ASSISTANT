<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Fragment Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">

</head>
<body>
<div class="container">
    <header>
        <h1>Book Fragment Search</h1>
        <p class="subtitle">Search for specific text fragments within classic literature</p>
    </header>

    <main>
        <section class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Enter text to search...">
                <button class="btn" id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <div class="options">
                <div class="option-group">
                    <input type="checkbox" id="caseSensitive" checked>
                    <label for="caseSensitive">Case Sensitive</label>
                </div>

                <div class="option-group">
                    <input type="checkbox" id="wholeWords">
                    <label for="wholeWords">Whole Words Only</label>
                </div>

                <div class="option-group">
                    <input type="checkbox" id="highlightAll" checked>
                    <label for="highlightAll">Highlight All Matches</label>
                </div>
            </div>
        </section>

        <section class="results-container">
            <div class="results-header">
                <div class="result-count" id="resultCount">Found 0 matches</div>
                <div class="sort-options">
                    <select id="sortBy">
                        <option value="position">Sort by Position</option>
                        <option value="relevance">Sort by Relevance</option>
                    </select>
                </div>
            </div>

            <div class="book-content" id="bookContent">
                <!-- Book content will be dynamically inserted here -->
            </div>

            <div class="pagination" id="pagination">
                <!-- Pagination buttons will be generated here -->
            </div>
        </section>
    </main>

    <footer>
        <p>Book Fragment Search Tool &copy; 2023 | Minimalist Design</p>
    </footer>
</div>

<script>
        // Sample book content (excerpt from "Pride and Prejudice")
        const bookText = `
        It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.

        However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered as the rightful property of some one or other of their daughters.

        "My dear Mr. Bennet," said his lady to him one day, "have you heard that Netherfield Park is let at last?"

        Mr. Bennet replied that he had not.

        "But it is," returned she; "for Mrs. Long has just been here, and she told me all about it."

        Mr. Bennet made no answer.

        "Do not you want to know who has taken it?" cried his wife impatiently.

        "You want to tell me, and I have no objection to hearing it."

        This was invitation enough.

        "Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week."

        "What is his name?"

        "Bingley."

        "Is he married or single?"

        "Oh! Single, my dear, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!"

        "How so? How can it affect them?"

        "My dear Mr. Bennet," replied his wife, "how can you be so tiresome! You must know that I am thinking of his marrying one of them."

        "Is that his design in settling here?"

        "Design! Nonsense, how can you talk so! But it is very likely that he may fall in love with one of them, and therefore you must visit him as soon as he comes."

        "I see no occasion for that. You and the girls may go, or you may send them by themselves, which perhaps will be still better, for as you are as handsome as any of them, Mr. Bingley might like you the best of the party."

        "My dear, you flatter me. I certainly have had my share of beauty, but I do not pretend to be anything extraordinary now. When a woman has five grown-up daughters, she ought to give over thinking of her own beauty."

        "In such cases, a woman has not often much beauty to think of."

        "But, my dear, you must indeed go and see Mr. Bingley when he comes into the neighbourhood."

        "It is more than I engage for, I assure you."

        "But consider your daughters. Only think what an establishment it would be for one of them. Sir William and Lady Lucas are determined to go, merely on that account, for in general you know they visit no new comers. Indeed you must go, for it will be impossible for us to visit him, if you do not."

        "You are over-scrupulous surely. I dare say Mr. Bingley will be very glad to see you; and I will send a few lines by you to assure him of my hearty consent to his marrying whichever he chooses of the girls; though I must throw in a good word for my little Lizzy."

        "I desire you will do no such thing. Lizzy is not a bit better than the others; and I am sure she is not half so handsome as Jane, nor half so good-humoured as Lydia. But you always liked her because she is clever."

        "We all know that he is clever," replied Mr. Bennet; "but it is sometimes a disadvantage to be so very ready. She has sometimes great impudence."

        "I hope Mr. Bingley will like her, said his wife resignedly.

        "I am not at all concerned. He may like her, if he dare."

        "But I am sure she will never suit him. He is a most charming young man, and I should be sorry to think so ill of him, as to suppose he would stoop to such a disgrace."

        "If there had been any young men concerned in the thing, I should have thought of it; but I could never hear of any gentleman in the neighbourhood concerned about it."

        "My dear, the country is full of gentlemen."

        "That is exactly what makes your carelessness the greater. I have nothing to do with gentlemen in the neighbourhood. If a stranger comes near enough, he may recommend himself to our notice; but we shall not trouble ourselves to look out for people."

        "Depend upon it, my dear, that when there are twenty, you will find me out every one of them."

        "The sooner the better. I hope he will fall in love with one of them before the winter is over. I have a great mind to pay him a visit tomorrow, and make myself perfectly agreeable."

        "I should be sorry to be the means of making any gentleman so extremely happy. But upon my honour, I do not think Mr. Bingley so very nice. There is something in his countenance that does not please me. Besides, he may fall in love with some other girl."

        "To be sure. Yes, to be sure. I did not think of that. Well, there is no harm done. Perhaps, after all, he may fall in love with one of the younger ones, and leave the eldest to shift for herself. If he marries Charlotte Lucas, it will be a very good thing for her."

        "Charlotte Lucas! My dear, he cannot stand long in need of a wife if he gets Charlotte Lucas for his wife."

        "The wisest and the best of all my daughters," interrupted her husband, "but at the same time, the most ill-judged and the most troublesome. If she succeeds in hooking him, it will be a triumph indeed."

        "Mr. Bennet, how can you abuse your own children in such a way? You take delight in vexing me. You have no compassion for my poor nerves."

        "You mistake me, my dear. I have a high respect for your nerves. They are my old friends. I have heard you mention them with consideration these twenty years at least."

        "Ah, you do not know what I suffer."

        "But I hope you will get over it, and live to see many young men of four thousand a year come into the neighbourhood."

        "It will be no use to us, if twenty such should come since you will not visit them."

        "Depend upon it, my dear, that when there are twenty, you will find me out every one of them."
        `;

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const bookContent = document.getElementById('bookContent');
        const resultCount = document.getElementById('resultCount');
        const pagination = document.getElementById('pagination');
        const caseSensitive = document.getElementById('caseSensitive');
        const wholeWords = document.getElementById('wholeWords');
        const highlightAll = document.getElementById('highlightAll');
        const sortBy = document.getElementById('sortBy');

        // State variables
        let currentSearchTerm = '';
        let searchResults = [];
        let currentPage = 1;
        const resultsPerPage = 5;

        // Initialize the page
        function init() {
            bookContent.innerHTML = formatText(bookText);
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // Set up option listeners
            [caseSensitive, wholeWords, highlightAll, sortBy].forEach(option => {
                option.addEventListener('change', performSearch);
            });
        }

        // Format text with paragraphs
        function formatText(text) {
            return text.split('\n\n').map(paragraph =>
                `<p>${paragraph.trim()}</p>`
            ).join('');
        }

        // Perform the search
        function performSearch() {
            currentSearchTerm = searchInput.value.trim();

            if (!currentSearchTerm) {
                bookContent.innerHTML = formatText(bookText);
                resultCount.textContent = 'Found 0 matches';
                pagination.innerHTML = '';
                return;
            }

            // Create regex based on options
            let flags = 'g';
            if (!caseSensitive.checked) flags += 'i';

            let searchTerm = currentSearchTerm;
            if (wholeWords.checked) {
                searchTerm = '\\b' + searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b';
            } else {
                searchTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            try {
                const regex = new RegExp(searchTerm, flags);
                searchResults = [];

                // Find all matches
                let match;
                while ((match = regex.exec(bookText)) !== null) {
                    searchResults.push({
                        index: match.index,
                        length: match[0].length,
                        text: match[0]
                    });
                }

                // Update result count
                resultCount.textContent = `Found ${searchResults.length} match${searchResults.length !== 1 ? 'es' : ''}`;

                // Display results
                displayResults();
                renderPagination();
            } catch (e) {
                console.error('Invalid regex:', e);
                bookContent.innerHTML = '<div class="no-results"><i class="fas fa-exclamation-triangle"></i><p>Invalid search pattern</p></div>';
                resultCount.textContent = 'Found 0 matches';
                pagination.innerHTML = '';
            }
        }

        // Display search results
        function displayResults() {
            if (searchResults.length === 0) {
                bookContent.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><p>No matches found for your search term.</p></div>';
                return;
            }

            // Calculate pagination
            const startIndex = (currentPage - 1) * resultsPerPage;
            const endIndex = Math.min(startIndex + resultsPerPage, searchResults.length);
            const pageResults = searchResults.slice(startIndex, endIndex);

            // Highlight matches in text
            let highlightedText = bookText;

            if (highlightAll.checked) {
                // Highlight all matches
                highlightedText = bookText.replace(new RegExp(currentSearchTerm, 'gi'), match =>
                    `<span class="highlight">${match}</span>`
                );
            } else if (pageResults.length > 0) {
                // Highlight only current page matches
                const firstMatch = pageResults[0];
                const beforeMatch = bookText.substring(0, firstMatch.index);
                const matchText = bookText.substring(firstMatch.index, firstMatch.index + firstMatch.length);
                const afterMatch = bookText.substring(firstMatch.index + firstMatch.length);

                highlightedText = `${beforeMatch}<span class="highlight">${matchText}</span>${afterMatch}`;
            }

            bookContent.innerHTML = formatText(highlightedText);
        }

        // Render pagination controls
        function renderPagination() {
            pagination.innerHTML = '';

            if (searchResults.length === 0) return;

            const pageCount = Math.ceil(searchResults.length / resultsPerPage);

            if (pageCount <= 1) return;

            // Previous button
            const prevBtn = document.createElement('div');
            prevBtn.className = 'page-btn';
            prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayResults();
                    renderPagination();
                }
            });
            pagination.appendChild(prevBtn);

            // Page buttons
            for (let i = 1; i <= pageCount; i++) {
                const pageBtn = document.createElement('div');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    displayResults();
                    renderPagination();
                });
                pagination.appendChild(pageBtn);
            }

            // Next button
            const nextBtn = document.createElement('div');
            nextBtn.className = 'page-btn';
            nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            nextBtn.addEventListener('click', () => {
                if (currentPage < pageCount) {
                    currentPage++;
                    displayResults();
                    renderPagination();
                }
            });
            pagination.appendChild(nextBtn);
        }

        // Initialize when page loads
        window.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
