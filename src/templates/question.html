{% extends "base.html" %}

{% block content %}
<main>
    <section class="search-container">
        <form method="POST" action="/question">
            <div class="search-box">
                <input name="user_text" type="text" class="search-input" id="searchInput"
                       placeholder="Введите ваш запрос...">
                <button type="submit" class="btn" id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            <div class="dropdown-container" style="display: flex; gap: 15px; margin-top: 20px;">
                <select id="tom-select-example" name="books" class="search-input"
                        style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">Выберите книгу и автора</option>
                    {% for item in books_and_authors%}
                    <option>{{"{} - {}".format(item[0], item[1])}}</option>
                    {% endfor %}
                </select>
            </div>
        </form>
    </section>

    <section class="results-container">
        {% if answer and answer != '1' %}
        <div class="results-header" style="padding: 5%;">
            <div class="result-count">{{answer | safe}}</div>
        </div>
        <div class="results-header time-display">
            <div class="result-count">Затрачено времени: {{time}}</div>
        </div>
        {% elif answer == '1' %}
        <div class="results-header">
            <div class="result-count">
                <ul style="padding-left: 5%; padding-right: 5%; padding-top: 0%; padding-bottom: 0%;">
                    <li>Здесь Вы увидите ответ на Ваш вопрос</li>
                </ul>
            </div>
        </div>
        {% else %}
        <div class="results-header no-results">
            <div class="result-count">К сожалению, ничего не найдено</div>
        </div>
        {% endif %}
    </section>
</main>

{% endblock %}
